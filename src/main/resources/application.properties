spring.application.name=task-manager-app

# Server Configuration
# Render assigns a dynamic port via the PORT environment variable.
# If not provided, default to 8080
server.port=${PORT:8080}

# Database Configuration
# PostgreSQL connection details using Render environment variables
# Set these in Render Dashboard -> Environment -> Environment Variables
spring.datasource.url=${DB_URL}           # Neon PostgreSQL host URL
spring.datasource.username=${DB_USERNAME} # Neon DB username
spring.datasource.password=${DB_PASSWORD} # Neon DB password


# Hibernate / JPA Settings
# Automatically create/update tables based on your entity classes
spring.jpa.hibernate.ddl-auto=update

# Show generated SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true

# Format SQL for readability in console logs
spring.jpa.properties.hibernate.format_sql=true


# PostgreSQL Driver & Dialect
# Required to connect to PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate dialect for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect